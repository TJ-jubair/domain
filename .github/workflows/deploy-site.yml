name: Deploy Web Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'public/**'  # Only triggers if files inside the public folder change

permissions:
  contents: write    # Grants permission to write to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Deploy Public Folder to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages  # The automated target branch hosting compiles into
