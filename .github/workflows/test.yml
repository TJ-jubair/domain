name: Core Domain Validator

on:
  pull_request_target:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write # Required to add/remove labels

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch Target Branch for Diffing
        run: |
          git fetch origin main:origin/main

      - name: Extract PR File Diffs
        run: node util/get-pr-files.js

      - name: Run Validation Tests
        id: validation # Added ID to reference this step's outcome
        run: npm run validate
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_ID: ${{ github.event.pull_request.user.id }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}

      - name: Handle Ownership Labels
        if: always() # Ensures this runs even if validation fails
        uses: actions/github-script@v7
        with:
          script: |
            const isSuccess = "${{ steps.validation.outcome }}" === "success";
            const labelToAdd = isSuccess ? "ownership: verified" : "ownership: unauthorized";
            const labelToRemove = isSuccess ? "ownership: unauthorized" : "ownership: verified";

            // Remove the opposite label
            try {
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelToRemove
              });
            } catch (e) {
              // Label didn't exist, ignore
            }

            // Add the appropriate label
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: [labelToAdd]
            });
