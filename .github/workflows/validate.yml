name: Validate Domain Registry
on:
  pull_request_target:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Head Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24' # ⬆️ Bumped to 24 to fix the future deprecation warning
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # 🧹 Swapped to npm ci for a more reliable automated build

      - name: Fetch Target Branch for Diffing
        run: git fetch origin main:origin/main

      - name: Extract PR File Diffs
        run: node util/get-pr-files.js

      - name: Run Core Code Validator
        run: npm run validate # 🛠️ Swapped npx ava for your custom validation script
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_ID: ${{ github.event.pull_request.user.id }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}

      - name: Compile JSON Registry Index (Dry-Run Test)
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const domainsDir = path.join(process.cwd(), 'domains');
          if (!fs.existsSync(domainsDir)) process.exit(1);
          const files = fs.readdirSync(domainsDir);
          const result = files
            .filter(f => f.endsWith('.json') && f !== 'example.json')
            .map(f => ({ subdomain: f.replace('.json', '').toLowerCase(), records: JSON.parse(fs.readFileSync(path.join(domainsDir, f), 'utf8')).records }));
          fs.writeFileSync('dist-domains.json', JSON.stringify(result, null, 2));
          "
